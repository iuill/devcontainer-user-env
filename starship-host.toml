[custom.host]
command = 'printf HOST'
when = 'test "$DEVCONTAINER_PROMPT_CONTEXT" = HOST'
symbol = '⚠️'
format = '[ $symbol ](bold white bg:black)[ $output ](bold black bg:yellow) '

[custom.workspace_directory]
command = '"$DEVCONTAINER_USER_ENV_ROOT/bin/prompt-directory"'
when = 'test "$DEVCONTAINER_PROMPT_CONTEXT" = HOST'
format = '[$output](bold cyan) '

[directory]
disabled = true
