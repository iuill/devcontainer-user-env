format = """
${custom.host}\
$username\
$hostname\
$localip\
$shlvl\
$singularity\
$kubernetes\
$nats\
${custom.workspace_directory}\
$vcsh\
$fossil_branch\
$fossil_metrics\
$git_branch\
$git_commit\
$git_state\
$git_metrics\
$git_status\
$hg_branch\
$pijul_channel\
$docker_context\
$memory_usage\
$aws\
$gcloud\
$openstack\
$azure\
$direnv\
$env_var\
$crystal\
$sudo\
$cmd_duration\
$line_break\
$jobs\
$battery\
$time\
$status\
$container\
$os\
$shell\
$character"""

[custom.host]
command = 'printf HOST'
when = 'test "$DEVCONTAINER_PROMPT_CONTEXT" = HOST'
symbol = '⚠️'
format = '[ $symbol ](bold white bg:black)[ $output ](bold black bg:yellow) '

[custom.workspace_directory]
command = '"$DEVCONTAINER_USER_ENV_ROOT/bin/prompt-directory"'
when = 'test "$DEVCONTAINER_PROMPT_CONTEXT" = HOST'
format = '[$output](bold cyan) '

[directory]
disabled = true
